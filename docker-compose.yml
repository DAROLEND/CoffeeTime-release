services:
  app:
    build: .
    ports:
      - "8080:80"
    env_file: .env
    environment:
      DB_HOST: db         # overrides DB_HOST from .env — always use the db service in Docker
    volumes:
      - images:/var/www/html/static/images   # uploaded images survive container restarts
      - logs:/var/www/html/logs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-changeme}
      MYSQL_DATABASE: ${DB_NAME:-coffeetime}
      MYSQL_USER: ${DB_USER:-coffeetime}
      MYSQL_PASSWORD: ${DB_PASS:-secret}
    volumes:
      - db_data:/var/lib/mysql
      - ./CoffeeTime.sql:/docker-entrypoint-initdb.d/init.sql:ro   # auto-import on first run
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 10s
      retries: 15
    restart: unless-stopped

volumes:
  db_data:
  images:
  logs:
